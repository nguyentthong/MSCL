data:
  dataset: dummy
  anno_dir: data/annotations
  video_feat_dir: data/features/video
  text_feat_dir: data/features/text
  video_feat_dim: 256
  text_feat_dim: 128
  max_video_len: 64
  max_query_len: 8
  feature_stride: 1.0
  num_workers: 0

model:
  hidden_dim: 64
  num_heads: 2
  num_layers: 3
  window_size: 7
  downsample_rate: 2
  dropout: 0.0
  text_encoder_layers: 1
  head_layers: 2
  head_kernel_size: 3

loss:
  focal_alpha: 0.25
  focal_gamma: 2.0
  rho_reg: 1.0
  rho_within: 1.0
  rho_cross: 1.0
  center_sampling_alpha: 1.5
  temperature: 1.0

train:
  epochs: 2
  batch_size: 2
  lr: 0.001
  weight_decay: 0.0
  warmup_epochs: 0
  grad_clip: 1.0
  amp: false
  val_interval: 1
  save_dir: checkpoints/dummy
  log_interval: 1
  seed: 42

eval:
  batch_size: 2
  recall_k: [1, 5]
  tiou_thresholds: [0.3, 0.5]
  nms_sigma: 0.5
  nms_threshold: 0.001
  max_predictions: 50
  pre_nms_topk: 100
